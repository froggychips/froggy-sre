name: CI (self-hosted)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (self-hosted)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Verify runner identity
        run: |
          test "$(uname -m)" = "arm64" || { echo "Not ARM64: $(uname -m)"; exit 1; }
          major=$(sw_vers -productVersion | cut -d. -f1)
          test "$major" -ge 14 || { echo "macOS < 14: $(sw_vers -productVersion)"; exit 1; }
          sw_vers

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release 2>&1

      - name: Test
        run: swift test 2>&1
